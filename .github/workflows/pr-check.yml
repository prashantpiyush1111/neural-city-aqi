- name: Check for broken links in HTML
  run: |
    set -e

    # Extract all href links from index.html
    grep -oP '(?<=href=")[^"]+' index.html | grep "^http" | \
      grep -v "fonts.googleapis.com" | \
      grep -v "fonts.gstatic.com" | \
      grep -v "cdn\." \
      > /tmp/urls.txt || true

    # Check if file has URLs
    if [ -s /tmp/urls.txt ]; then
      while IFS= read -r url; do
        STATUS=$(curl -o /dev/null -s -w "%{http_code}" \
          --max-time 15 --connect-timeout 10 -L "$url" || echo "000")

        if [ "$STATUS" -ge 400 ]; then
          echo "❌ Broken link: $url (Status: $STATUS)"
          exit 1
        else
          echo "✅ OK: $url"
        fi
      done < /tmp/urls.txt
    else
      echo "✅ No external links to validate"
    fi
